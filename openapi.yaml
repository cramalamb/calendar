openapi: 3.1.0
info:
  title: Local Calendar Service
  version: 1.0.0
  description: |
    Local FastAPI wrapper around Google Calendar with CRUD operations, free/busy, and day plans.
servers:
  - url: http://127.0.0.1:8010
    description: Local development server
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
  schemas:
    EventCreateRequest:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        description:
          type: string
        location:
          type: string
        attendees:
          type: array
          items:
            type: string
            format: email
        add_google_meet:
          type: boolean
        timezone:
          type: string
        start_iso:
          type: string
          format: date-time
        end_iso:
          type: string
          format: date-time
        duration_min:
          type: integer
          minimum: 1
    EventUpdateRequest:
      type: object
      required:
        - event_id
      properties:
        event_id:
          type: string
        title:
          type: string
        description:
          type: string
        location:
          type: string
        attendees:
          type: array
          items:
            type: string
            format: email
        clear_attendees:
          type: boolean
        add_google_meet:
          type: boolean
        timezone:
          type: string
        start_iso:
          type: string
          format: date-time
        end_iso:
          type: string
          format: date-time
        duration_min:
          type: integer
          minimum: 1
    EventDeleteRequest:
      type: object
      required:
        - event_id
      properties:
        event_id:
          type: string
    FreeBusyRequest:
      type: object
      required:
        - time_min_iso
        - time_max_iso
      properties:
        time_min_iso:
          type: string
          format: date-time
        time_max_iso:
          type: string
          format: date-time
        calendars:
          type: array
          items:
            type: string
        timezone:
          type: string
    DayPlanBlock:
      type: object
      required:
        - title
        - duration_min
      properties:
        title:
          type: string
        start_time:
          type: string
          description: HH:MM 24h format
        duration_min:
          type: integer
          minimum: 1
        description:
          type: string
        add_google_meet:
          type: boolean
        location:
          type: string
        attendees:
          type: array
          items:
            type: string
            format: email
    DayPlanRequest:
      type: object
      required:
        - date
      properties:
        date:
          type: string
          format: date
        plan_id:
          type: string
        blocks:
          type: array
          items:
            $ref: '#/components/schemas/DayPlanBlock'
        timezone:
          type: string
        attendees:
          type: array
          items:
            type: string
            format: email
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is running
  /events.create:
    post:
      summary: Create a calendar event
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventCreateRequest'
      responses:
        '200':
          description: Event created
  /events.update:
    post:
      summary: Update a calendar event
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventUpdateRequest'
      responses:
        '200':
          description: Event updated
  /events.delete:
    post:
      summary: Delete a calendar event
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventDeleteRequest'
      responses:
        '200':
          description: Event deleted
  /freebusy.query:
    post:
      summary: Run a free/busy query
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FreeBusyRequest'
      responses:
        '200':
          description: Free/busy response from Google
  /dayplan.apply:
    post:
      summary: Apply a day plan
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DayPlanRequest'
      responses:
        '200':
          description: Day plan applied
  /dayplan.templates:
    get:
      summary: List built-in day plan templates
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Day plan templates
